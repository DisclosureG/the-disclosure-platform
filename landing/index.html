<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Disclosure Platform</title>
    <link rel="icon" type="image/png" href="/demo/artefacts/favicon.png" />
    <link rel="apple-touch-icon" href="/demo/artefacts/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: oklch(0.14 0.012 240);
        --fg: oklch(0.95 0.01 240);
        --muted: oklch(0.72 0.02 240);
        --accent: oklch(0.78 0.12 220);
        --line: oklch(0.28 0.02 240);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 300;
        line-height: 1.6;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      main {
        max-width: 640px;
        text-align: center;
      }
      .mark {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: clamp(2.4rem, 6vw, 3.6rem);
        font-weight: 500;
        font-style: italic;
        letter-spacing: 0.01em;
        margin-bottom: 1.25rem;
      }
      .tagline {
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.125rem);
        margin-bottom: 2.5rem;
      }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.875rem 1.75rem;
        background: var(--accent);
        color: var(--bg);
        text-decoration: none;
        border-radius: 999px;
        font-weight: 500;
        font-size: 1rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px -8px var(--accent);
      }
      .foot {
        margin-top: 3rem;
        color: var(--muted);
        font-size: 0.875rem;
        border-top: 1px solid var(--line);
        padding-top: 1.5rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="mark">The Disclosure Platform</h1>
      <p class="tagline">A public, on-chain archive of evidence — submitted, reviewed, and attested by a verified peer network.</p>
      <a class="cta" href="/demo/">Enter the demo <span aria-hidden="true">→</span></a>
      <p class="foot">More coming soon.</p>
    </main>
  </body>
</html>
