[build]
  command   = "npm run build"
  publish   = "dist"

[[redirects]]
  from   = "/peer-review/*"
  to     = "/peer-review/index.html"
  status = 200

[[redirects]]
  from   = "/evidence/*"
  to     = "/evidence/index.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
