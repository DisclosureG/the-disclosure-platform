[build]
  command   = "npm run build"
  publish   = "dist"

[[redirects]]
  from   = "/admin/*"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/artefacts"
  to     = "/artefacts/index.html"
  status = 200

[[redirects]]
  from   = "/artefacts/"
  to     = "/artefacts/index.html"
  status = 200

[[redirects]]
  from   = "/peer-review/*"
  to     = "/peer-review/index.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/artefacts/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/artefacts/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
