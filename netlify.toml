[build]
  command   = "npm run build"
  publish   = "dist"

# Platform SPAs live under /demo/. SPA fallbacks must come first so deep links
# (e.g. /demo/evidence/foo) resolve to the section's index.html, not the root.

[[redirects]]
  from   = "/demo/peer-review/*"
  to     = "/demo/peer-review/index.html"
  status = 200

[[redirects]]
  from   = "/demo/evidence/*"
  to     = "/demo/evidence/index.html"
  status = 200

[[redirects]]
  from   = "/demo/*"
  to     = "/demo/index.html"
  status = 200

# Root serves the static landing page (dist/index.html). The catch-all keeps
# unknown root paths on the landing rather than 404ing.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/demo/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
